services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pm-mvp-app
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_TIMEOUT_SECONDS: ${OPENROUTER_TIMEOUT_SECONDS:-15}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      OPENROUTER_CHAT_MODE: ${OPENROUTER_CHAT_MODE:-board_snapshot}
      OPENROUTER_PROVIDER_SORT: ${OPENROUTER_PROVIDER_SORT:-}
      OPENROUTER_PROVIDER_ALLOW_FALLBACKS: ${OPENROUTER_PROVIDER_ALLOW_FALLBACKS:-}
      OPENROUTER_PROVIDER_REQUIRE_PARAMETERS: ${OPENROUTER_PROVIDER_REQUIRE_PARAMETERS:-true}
      OPENROUTER_PROVIDER_ORDER: ${OPENROUTER_PROVIDER_ORDER:-}
    ports:
      - "8000:8000"
